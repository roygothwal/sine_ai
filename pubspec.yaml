description: Sine AI - Your Personal AI Companion
name: sine_ai
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  google_fonts: ^6.1.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^6.2.1
  lottie: ^3.0.0
  curved_navigation_bar: ^1.0.3
  flutter_local_notifications: ^17.2.4
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  flutter_tts: ^4.2.5
  file_picker: ^8.0.0
  share_plus: ^10.1.4
  flutter_riverpod: ^2.6.1
  go_router: ^14.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  file_picker: ^8.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/aura_character/
